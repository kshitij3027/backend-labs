# nginx reverse-proxy + SPA host for the Predictive Log Analytics dashboard.
#
# Inside the docker-compose network the backend is reachable by its service
# name, `api`, on port 8000. The frontend uses RELATIVE URLs (`/api/...`); this
# config rewrites those onto the backend so the browser only ever talks to nginx
# on :80 (no CORS, no hardcoded backend host).

upstream backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Shared proxy headers so the backend sees the real client + host.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API: the trailing slash on proxy_pass strips the `/api` prefix, so
    # `/api/predictions` -> `http://api:8000/predictions`.
    location /api/ {
        proxy_pass http://backend/;
    }

    # SPA: serve built assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
