# Alembic configuration for the Predictive Log Analytics Engine.
#
# The actual database URL is NOT set here — `migrations/env.py` pulls it from
# `src.config.get_settings().database_url` so credentials live in one place and
# are never committed. The `sqlalchemy.url` below is an inert placeholder kept
# only so tooling that reads the key does not choke.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template used to generate new revision files.
# file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps inside migration files (blank = local).
# timezone =

# Inert placeholder; env.py overrides this from application settings.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# No post-write hooks configured.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
