# Predictive Log Analytics Engine — service topology (Commit C0).
#
# `api` is the runnable production service: a single uvicorn/FastAPI process on :8000.
# It depends on `postgres` (history persistence) and `redis` (prediction cache +
# Celery broker in later commits), both of which expose healthchecks so `api` only
# starts once they are ready.
#
# The profile-gated `test` service runs the pytest suite and never starts on a bare
# `docker compose up`. The worker, beat, dashboard, e2e and loadtest services are
# added in later commits. Run via `make up` / `make test`.

services:
  # PostgreSQL — durable store for metrics, forecasts, accuracy history, model
  # metadata (schema lands in C1). Internal to the compose network; the host port is
  # commented out to avoid clashing with a host-local Postgres.
  postgres:
    image: postgres:16-alpine
    container_name: log-forecast-postgres
    environment:
      - POSTGRES_USER=forecast
      - POSTGRES_PASSWORD=forecast
      - POSTGRES_DB=forecast
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast -d forecast"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — prediction cache (and Celery broker/backend in later commits). Persistence
  # is disabled so it behaves as an ephemeral cache. Internal to the compose network.
  redis:
    image: redis:7-alpine
    container_name: log-forecast-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Live production API — built from the production Dockerfile and exposed on the host.
  # Reaches Postgres/Redis over the compose network by service name (not localhost).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-forecast-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models:/app/models
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # /health is dependency-free, so the app is healthy as soon as uvicorn binds;
      # the 60s grace period is a safe margin for image start-up.
      start_period: 60s
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the same
  # code + requirements as the api, plus the tests) and runs pytest. Profile-gated so
  # it never starts on a bare `docker compose up`. Run via `make test`. Integration
  # tests (added later) reach Postgres/Redis by service name.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["pytest", "-q"]

# Named volumes keep the Postgres data + fitted models + generated datasets across
# container restarts.
volumes:
  pgdata:
  models:
  data:
