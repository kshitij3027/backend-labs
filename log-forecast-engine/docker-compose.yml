# Predictive Log Analytics Engine — service topology (Commit C0).
#
# `api` is the runnable production service: a single uvicorn/FastAPI process on :8000.
# It depends on `postgres` (history persistence) and `redis` (prediction cache +
# Celery broker in later commits), both of which expose healthchecks so `api` only
# starts once they are ready.
#
# The profile-gated `test` service runs the pytest suite and never starts on a bare
# `docker compose up`. The worker, beat, dashboard, e2e and loadtest services are
# added in later commits. Run via `make up` / `make test`.

services:
  # PostgreSQL — durable store for metrics, forecasts, accuracy history, model
  # metadata (schema lands in C1). Internal to the compose network; the host port is
  # commented out to avoid clashing with a host-local Postgres.
  postgres:
    image: postgres:16-alpine
    container_name: log-forecast-postgres
    environment:
      - POSTGRES_USER=forecast
      - POSTGRES_PASSWORD=forecast
      - POSTGRES_DB=forecast
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast -d forecast"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — prediction cache (and Celery broker/backend in later commits). Persistence
  # is disabled so it behaves as an ephemeral cache. Internal to the compose network.
  redis:
    image: redis:7-alpine
    container_name: log-forecast-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Live production API — built from the production Dockerfile and exposed on the host.
  # Reaches Postgres/Redis over the compose network by service name (not localhost).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # No container_name: Docker refuses `--scale api=N` (N>1) when a custom
    # container_name is set. Omitting it lets Compose name replicas
    # `<project>-api-1/2/...` so the service scales freely. Other services keep
    # their fixed names since only `api` needs to scale.
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models:/app/models
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # /health is dependency-free, so the app is healthy as soon as uvicorn binds;
      # the 60s grace period is a safe margin for image start-up.
      start_period: 60s
    restart: unless-stopped

  # Celery worker — runs the forecast/retrain tasks dispatched by Beat. Reuses the
  # shared production image; the `command:` overrides the default CMD (uvicorn) so
  # the same entrypoint.sh applies Alembic migrations (idempotent) and then
  # `exec`s the celery worker instead of the API. Waits for postgres + redis healthy
  # and for the api to be healthy (guaranteeing migrations have already run).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-forecast-worker
    command:
      ["celery", "-A", "src.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models:/app/models
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    # The shared image's HEALTHCHECK probes the HTTP /health endpoint, but the worker
    # runs Celery (no listener on :8000) so that probe would fail forever. Override it
    # with a Celery liveness ping. The plain `inspect ping` (no `-d <node>`) pings all
    # reachable workers and returns non-zero if none reply, which is the robust form
    # here (avoids depending on the exact node name / $HOSTNAME).
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Celery Beat — the single scheduler that emits periodic forecast/retrain tasks
  # on the cadence defined in src/celery_app.py (from settings). Only ONE beat
  # instance should ever run. Reuses the shared image with a `command:` override.
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-forecast-beat
    command: ["celery", "-A", "src.celery_app", "beat", "--loglevel=info"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models:/app/models
      - data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    # Beat exposes no inspectable ping, and the base image (python:3.11-slim) has no
    # procps/pgrep/ps for a process check — adding procps just for this would bloat the
    # image. So disable the inherited HTTP healthcheck rather than let beat be marked
    # unhealthy forever. Beat liveness is instead covered by `restart: unless-stopped`.
    healthcheck:
      disable: true
    restart: unless-stopped

  # Dashboard — React + Vite + Recharts SPA built multi-stage and served by nginx.
  # nginx reverse-proxies /api -> api:8000 (see frontend/nginx.conf), so the browser
  # only ever talks to nginx and there is no CORS / hardcoded backend host. Built
  # with `context: .` (project root) + `dockerfile: frontend/Dockerfile` so the
  # Dockerfile's COPY paths carry the `frontend/` prefix. Waits for the api to be
  # healthy before coming up.
  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: log-forecast-dashboard
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # nginx:alpine ships wget; a 200 on / means the SPA is being served. Target
      # 127.0.0.1 (not localhost): inside the container `localhost` can resolve to
      # IPv6 ::1, and the check would fail if nginx weren't listening on IPv6. nginx
      # now also `listen [::]:80;` (see frontend/nginx.conf), but 127.0.0.1 is the
      # belt-and-suspenders form.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the same
  # code + requirements as the api, plus the tests) and runs pytest. Profile-gated so
  # it never starts on a bare `docker compose up`. Run via `make test`. Integration
  # tests (added later) reach Postgres/Redis by service name.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    environment:
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["pytest", "-q"]

  # Black-box end-to-end verifier (C13). Reuses the tester image (it ships src/ +
  # scripts/) and runs scripts/verify_e2e.py against the LIVE api over the compose
  # network — exercising the whole flow (ingest -> on-demand forecast -> structured
  # §8 payload -> /predictions/health/metrics/models). Waits for the api healthcheck
  # (and postgres/redis healthy) first. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make e2e`.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    environment:
      - API_BASE_URL=http://api:8000
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]

  # Performance + load gates (C13). Reuses the tester image and runs perf_test.py
  # (latency / per-forecast timing gate) followed by load_test.py (throughput +
  # memory under concurrent load) against the LIVE api. Thresholds are env-tunable
  # (see the script docstrings) so the gates stay CI-safe. Waits for the api
  # healthcheck first. Profile-gated; run via `make load`.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [loadtest]
    environment:
      - API_BASE_URL=http://api:8000
      - DATABASE_URL=postgresql+psycopg2://forecast:forecast@postgres:5432/forecast
      - REDIS_URL=redis://redis:6379/0
      # Hard gates (stable across hosts):
      - PERF_MAX_SERVE_MS=${PERF_MAX_SERVE_MS:-2000}
      - LOAD_MIN_RPS=${LOAD_MIN_RPS:-20}
      - LOAD_MAX_ERROR_RATE=${LOAD_MAX_ERROR_RATE:-0.0}
      # Lenient / reported ceilings:
      - PERF_MAX_COMPUTE_MS=${PERF_MAX_COMPUTE_MS:-5000}
      - LOAD_MAX_RSS_MB=${LOAD_MAX_RSS_MB:-1024}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["sh", "-lc", "python scripts/perf_test.py && python scripts/load_test.py"]

# Named volumes keep the Postgres data + fitted models + generated datasets across
# container restarts.
volumes:
  pgdata:
  models:
  data:
