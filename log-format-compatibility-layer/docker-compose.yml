services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./logs:/app/logs
      - ./tests:/app/tests
      - ./src:/app/src

  verify:
    build:
      context: .
      dockerfile: Dockerfile.test
    entrypoint: ["bash", "/app/verify.sh"]
    volumes:
      - ./logs:/app/logs
    profiles:
      - verify
