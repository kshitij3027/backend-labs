# nginx reverse-proxy + SPA host for the Correlation Analysis dashboard.
#
# Inside the docker-compose network the backend is reachable by its service name,
# `backend`, on port 8000. The frontend uses RELATIVE URLs (`/api/...`); this config
# forwards those to the backend so the browser only ever talks to nginx on :80 (no
# CORS, no hardcoded backend host).
#
# Per-request DNS re-resolution: rather than a static `upstream { server backend; }`
# block (which resolves the name ONCE at startup and caches a single IP), we use the
# Docker `resolver` plus a runtime variable in proxy_pass so nginx looks the name up
# on every request. `valid=10s` bounds DNS caching. This keeps the proxy correct if
# the backend container is recreated (new IP) or ever scaled.
#
# IMPORTANT — no prefix strip (the ONE intentional divergence from the sibling
# log-recommendation-engine). The sibling's backend serves routes at the root, so it
# does `rewrite ^/api/(.*)$ /$1 break;` to turn `/api/health` -> `/health`. OUR backend
# already namespaces everything under `/api/v1/*`, so we must forward the path VERBATIM.
# When proxy_pass uses a VARIABLE it does NOT auto-append the location-matched URI, so
# we pass `$request_uri` explicitly (it carries the full original path + query string):
# `/api/v1/dashboard?x=1` -> `http://backend:8000/api/v1/dashboard?x=1`.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker's embedded DNS — required for per-request re-resolution of `backend`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Shared proxy headers so the backend sees the real client + host.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API: the target lives in a variable so nginx uses the `resolver` at
    # request time. `$request_uri` forwards the path UNCHANGED (no `/api` strip),
    # because our endpoints already live under `/api/v1`.
    location /api/ {
        set $backend "http://backend:8000";
        proxy_pass $backend$request_uri;
    }

    # SPA: serve built assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Cheap gzip for the JS/CSS bundle and JSON proxy responses.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
