# Correlation Analysis System — service topology (Commit C1).
#
# `backend` is the runnable production service: a single uvicorn/FastAPI process on
# :8000 that (from C3) also hosts the log-generation + correlation-detection pipeline
# as an asyncio task. It depends on `redis` (event mirror, pattern baselines, alert
# pub/sub), which exposes a healthcheck so `backend` only starts once it is ready.
#
# The profile-gated `test`, `e2e` (C8) and `loadtest` (C8) services run the pytest
# suite, the black-box E2E verifier and the perf/load harness respectively; none of
# them starts on a bare `docker compose up`. The frontend (C9) service is added in a
# later commit. Run via `make up` / `make test` / `make e2e` / `make load`.

services:
  # Redis — shared state (recent events/correlations, learned patterns, alerts).
  # Persistence is disabled so it behaves as an ephemeral cache. The host port is
  # published so the test agent can probe keys with a host-side redis-cli.
  redis:
    image: redis:7-alpine
    container_name: correlation-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Live production API — built from the production Dockerfile and exposed on the
  # host. Reaches Redis over the compose network by service name (not localhost).
  # No container_name (sibling convention: leaves compose free to name/scale it).
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # /health is dependency-free, so the app is healthy as soon as uvicorn binds;
      # 20s is a safe margin for image start-up.
      start_period: 20s
    restart: unless-stopped

  # React (Vite) dashboard (C9) — a static SPA built by frontend/Dockerfile and served
  # by nginx, which reverse-proxies /api STRAIGHT THROUGH to `backend:8000` (no prefix
  # strip — our routes already live under /api/v1). The SPA polls GET /api/v1/dashboard
  # every 5s. Build context is the PROJECT ROOT (so the Dockerfile's COPY paths carry
  # the `frontend/` prefix); it only starts once the backend is healthy.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # nginx:alpine ships wget (busybox) — a 200 on / means the SPA is being served.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the same
  # code + requirements as the backend, plus the tests) and runs pytest. Profile-gated
  # so it never starts on a bare `docker compose up`. Run via `make test`.
  # Integration tests (from C3) reach Redis by service name.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Deterministic tests: never start the background pipeline in the test
      # process — tests drive ticks/requests explicitly.
      - PIPELINE_ENABLED=false
    depends_on:
      redis:
        condition: service_healthy
    command: ["pytest", "-q"]

  # Black-box E2E verifier (C8). Reuses the tester image (Dockerfile.test ships src/ +
  # scripts/ + httpx) and runs scripts/verify_e2e.py against the LIVE backend over the
  # compose network — HTTP only, 14 ordered checks covering the whole pipeline
  # (throughput, all 5 correlation types, detection latency, session accuracy vs
  # ground truth, target scenario correlations, alerts, dashboard shape, memory).
  # Every gate below is host-overridable. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make e2e`; a failed check exits non-zero.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    environment:
      - E2E_BASE_URL=http://backend:8000
      - MIN_EVENTS_PER_SEC=${MIN_EVENTS_PER_SEC:-100}
      - E2E_MAX_P95_LATENCY=${E2E_MAX_P95_LATENCY:-5.0}
      - E2E_MIN_SESSION_RECALL=${E2E_MIN_SESSION_RECALL:-0.95}
      - E2E_MAX_P_ADJ=${E2E_MAX_P_ADJ:-0.05}
      - MAX_BACKEND_MEM_MB=${MAX_BACKEND_MEM_MB:-200}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["python", "-m", "scripts.verify_e2e"]

  # Load / performance harness (C8). Same tester image, running scripts/load_test.py
  # against the LIVE backend over the compose network — four hard-gated phases:
  # sustained ingest, sequential stats latency, 100-way concurrent mixed GETs
  # (RPS + error rate), and server-reported memory. Every gate below is
  # host-overridable (e.g. `MIN_EVENTS_PER_SEC=100000 make load` proves the gate
  # bites). Profile-gated so it never starts on a bare `docker compose up`.
  # Run via `make load`; a breached gate exits non-zero.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [loadtest]
    environment:
      - BASE_URL=http://backend:8000
      - LOAD_CONCURRENCY=${LOAD_CONCURRENCY:-100}
      - LOAD_REQUESTS=${LOAD_REQUESTS:-500}
      - LOAD_MIN_RPS=${LOAD_MIN_RPS:-50}
      - STATS_SEQUENTIAL=${STATS_SEQUENTIAL:-50}
      - STATS_AVG_MS_MAX=${STATS_AVG_MS_MAX:-50}
      - STATS_MAX_MS=${STATS_MAX_MS:-100}
      - LOAD_MAX_ERROR_RATE=${LOAD_MAX_ERROR_RATE:-0.0}
      - MAX_BACKEND_MEM_MB=${MAX_BACKEND_MEM_MB:-200}
      - MIN_EVENTS_PER_SEC=${MIN_EVENTS_PER_SEC:-100}
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "scripts.load_test"]
