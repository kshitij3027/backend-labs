services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  node-1:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      NODE_ID: node-1
      NODE_PORT: "8101"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8101:8101"
    depends_on:
      redis:
        condition: service_healthy

  node-2:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      NODE_ID: node-2
      NODE_PORT: "8102"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8102:8102"
    depends_on:
      redis:
        condition: service_healthy

  node-3:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      NODE_ID: node-3
      NODE_PORT: "8103"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8103:8103"
    depends_on:
      redis:
        condition: service_healthy

  node-4:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      NODE_ID: node-4
      NODE_PORT: "8104"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8104:8104"
    depends_on:
      redis:
        condition: service_healthy

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    environment:
      COORDINATOR_PORT: "8000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VIRTUAL_NODES: "100"
      REQUEST_TIMEOUT: "5.0"
      NODE_URLS: "node-1=http://node-1:8101,node-2=http://node-2:8102,node-3=http://node-3:8103,node-4=http://node-4:8104"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy
      node-4:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]
    volumes:
      - ./:/app
    environment:
      PYTHONPATH: /app
    depends_on:
      - redis
      - coordinator
