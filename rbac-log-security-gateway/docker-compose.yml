# Compose stack for the RBAC Log Security Gateway. Backend on :8000, tester runs the pytest suite. Frontend service is added in C11a.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: rbac-gateway-backend:dev
    container_name: rbac-gateway-backend
    ports:
      - "8000:8000"
    env_file:
      # `.env` is auto-generated by scripts/start.sh in C5; treat as optional
      # so `docker compose config` works on a fresh clone before that runs.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: backend/Dockerfile.test
    image: rbac-gateway-tester:dev
    container_name: rbac-gateway-tester
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      # Override so tests don't depend on a real .env existing.
      JWT_SECRET_KEY: "test-secret-key-please-change"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/tests:/app/tests:ro
      - ./backend/pytest.ini:/app/pytest.ini:ro
    working_dir: /app
    command: ["pytest", "-v"]
