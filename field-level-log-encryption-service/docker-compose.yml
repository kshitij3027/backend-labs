# Compose stack for the Field-Level Log Encryption Service.
# C9 added the `redis` service backing the C9 CacheProvider; `app` and
# `tester` both wait for redis to report healthy before starting so the
# Redis-backed integration tests have something to talk to.

services:
  redis:
    # Pinned alpine variant: small image, official Redis 7.x. Pinning the
    # major+minor lets us rebuild reproducibly while still catching
    # patch-level CVE fixes via image pulls.
    image: redis:7-alpine
    container_name: field-log-enc-redis
    ports:
      # Exposed locally so an operator can run `redis-cli` from the host
      # to inspect counter state during demos. Internal traffic from the
      # `app` container goes via the docker-compose network — port mapping
      # is a developer ergonomics affordance, not a production posture.
      - "6379:6379"
    healthcheck:
      # `redis-cli ping` returns `PONG` (exit 0) iff Redis can serve
      # commands. The `app` service's `depends_on: condition: service_healthy`
      # gates startup on this check passing.
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: field-log-enc-app:latest
    container_name: field-log-enc-app
    ports:
      - "8000:8000"
    depends_on:
      # Wait for Redis to actually be serving commands, not just for the
      # container to start. `service_healthy` blocks until the
      # `redis-cli ping` healthcheck above succeeds — without this gate
      # the app's startup-time Redis ping would race the redis container
      # and we'd flap into the in-memory fallback on every cold boot.
      redis:
        condition: service_healthy
    env_file:
      # `.env` is generated by the operator from `.env.example`. Mark optional
      # so `docker compose config` works on a fresh clone before env setup.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      # REDIS_HOST is read by `src.settings.Settings`; `.env.example`
      # already sets it to `redis` so this is belt-and-braces for the
      # case where the operator forgot to copy that file.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: field-log-enc-tester:latest
    container_name: field-log-enc-tester
    profiles:
      - test
    depends_on:
      # Same gate as the `app` service so the Redis integration tests
      # (`tests/integration/test_redis_cache.py`) reliably find a live
      # Redis to talk to. The unit tests don't need Redis but waiting a
      # few extra seconds at test startup is harmless.
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      # Tester also needs to know the redis host so the integration
      # tests can connect. The unit tests are gated on this env var
      # being set, which mirrors the production wiring.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - .:/app
    working_dir: /app
    command: ["pytest", "-v", "--tb=short", "--cov=src", "--cov-report=term-missing"]
