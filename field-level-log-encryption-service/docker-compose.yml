# Compose stack for the Field-Level Log Encryption Service.
# C1 ships with just the `app` service + a `tester` profile.
# Redis is wired in C9 once the cache provider lands.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: field-log-enc-app:latest
    container_name: field-log-enc-app
    ports:
      - "8000:8000"
    env_file:
      # `.env` is generated by the operator from `.env.example`. Mark optional
      # so `docker compose config` works on a fresh clone before env setup.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: field-log-enc-tester:latest
    container_name: field-log-enc-tester
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    working_dir: /app
    command: ["pytest", "-v", "--tb=short", "--cov=src", "--cov-report=term-missing"]
