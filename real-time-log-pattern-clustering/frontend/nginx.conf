# nginx reverse-proxy + SPA host for the Real-Time Log Pattern Clustering dashboard.
#
# Inside the docker-compose network the backend is reachable by its service
# name, `app`, on port 8000. The frontend uses RELATIVE URLs (`/api/...`,
# `/ws/stream`); this config rewrites those onto the backend so the browser
# only ever talks to nginx on :80 (no CORS, no hardcoded backend host).

upstream backend {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Shared proxy headers so the backend sees the real client + host.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API: the trailing slash on proxy_pass strips the `/api` prefix, so
    # `/api/stats` -> `http://app:8000/stats`.
    location /api/ {
        proxy_pass http://backend/;
    }

    # WebSocket: `/ws/stream` -> `http://app:8000/ws/stream` with the HTTP/1.1
    # Upgrade handshake. The long read timeout keeps the idle live feed open.
    location /ws/ {
        proxy_pass http://backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA: serve built assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
