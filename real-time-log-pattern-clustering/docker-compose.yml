# Real-Time Log Pattern Clustering — service topology (Commit 1).
#
# `app` is the runnable production service: a single uvicorn/FastAPI process on :8000.
# Fitted models and generated data persist on named volumes so they survive restarts.
#
# The profile-gated `test` service runs the pytest suite and never starts on a bare
# `docker compose up`. Redis, the nginx dashboard, the load-test and the E2E verifier
# services are added in later commits. Run via `make up` / `make test`.

services:
  # Live production service — built from the production Dockerfile and exposed on the
  # host. Tunable knobs (log level, config path) are overridable from the environment.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-log-clustering-app
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CONFIG_PATH=/app/config/config.yaml
      # Reach Redis over the compose network by service name (not localhost).
      - REDIS_HOST=redis
    volumes:
      - models:/app/models
      - data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # /health is dependency-free, so the app is healthy as soon as uvicorn binds;
      # the 60s grace period is a safe margin for image start-up.
      start_period: 60s
    restart: unless-stopped

  # Cluster-state / anomaly-history backend for the StateStore. Persistence is disabled
  # (--save "" / --appendonly no) so it behaves as an ephemeral cache; the engine falls
  # back to in-memory state if it is ever unreachable. No host port is published — it is
  # internal to the compose network, which avoids clashing with a host-local Redis.
  redis:
    image: redis:7-alpine
    container_name: rt-log-clustering-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # React + WebSocket dashboard (Commit 14). A multi-stage image builds the Vite
  # SPA and serves it from nginx, which reverse-proxies `/api` and `/ws/stream` to
  # the `app` service over the compose network (so the browser only talks to nginx).
  # Waits for `app` to be healthy before starting. Brought up via `make ui`.
  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rt-log-clustering-dashboard
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the same
  # code + requirements as the app, plus the tests) and runs pytest in-process — no
  # running service required. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make test`.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    # `compose run test` starts depends_on services, so the integration suite can reach
    # Redis at host `redis`. The memory-only unit tests ignore it.
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    command: ["pytest", "-q"]

  # Performance + load suite (Commit 13). Reuses the tester image (it ships `requests`,
  # `websocket-client`, and the whole project, so `scripts/` are present) but, unlike
  # `test`, runs BLACK-BOX against the live `app` over the compose network — it waits
  # for the app healthcheck, then runs the latency gates (perf_test.py) and the
  # throughput gate (load_test.py) back to back. Profile-gated so it never starts on a
  # bare `docker compose up`. Run via `make load`.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [load]
    depends_on:
      app:
        condition: service_healthy
    environment:
      - APP_URL=http://app:8000
    command: ["sh", "-c", "python scripts/perf_test.py && python scripts/load_test.py"]

  # Full black-box end-to-end verifier (Commit 13). Reuses the tester image and runs
  # `scripts/verify_e2e.py` against the live `app` over the compose network — exercising
  # the entire flow (health -> cluster -> cluster/batch -> stats -> clusters -> patterns/
  # anomalies/scatter/config -> WebSocket snapshot). Waits for the app healthcheck first.
  # Profile-gated so it never starts on a bare `docker compose up`. Run via `make e2e`.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    depends_on:
      app:
        condition: service_healthy
    environment:
      - APP_URL=http://app:8000
    command: ["python", "scripts/verify_e2e.py"]

# Named volumes keep fitted models + generated datasets across container restarts.
volumes:
  models:
  data:
