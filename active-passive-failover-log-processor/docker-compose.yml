services:
  redis:
    image: redis:7-alpine
    container_name: failover-redis
    networks:
      - failover-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 5
    restart: "no"

  node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: failover-node-1
    environment:
      NODE_ID: "node-1"
      IS_PRIMARY: "true"
      PORT: "8001"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PEER_NODES: "node-2:8002,node-3:8003"
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - failover-net
    restart: "no"

  node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: failover-node-2
    environment:
      NODE_ID: "node-2"
      IS_PRIMARY: "false"
      PORT: "8002"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PEER_NODES: "node-1:8001,node-3:8003"
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - failover-net
    restart: "no"

  node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: failover-node-3
    environment:
      NODE_ID: "node-3"
      IS_PRIMARY: "false"
      PORT: "8003"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PEER_NODES: "node-1:8001,node-2:8002"
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - failover-net
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: failover-dashboard
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PEER_NODES: "node-1:8001,node-2:8002,node-3:8003"
      DASHBOARD_POLL_INTERVAL: "1.0"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - failover-net
    restart: "no"

networks:
  failover-net:
    driver: bridge
