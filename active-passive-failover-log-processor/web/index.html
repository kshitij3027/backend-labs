<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Failover Cluster Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #f5f6f8;
      color: #1f2933;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      align-items: center;
      padding: 12px 16px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status-bar .label { color: #6b7280; }

    .status-bar .value { font-weight: 600; }

    .status-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-pill.connected {
      background: #ecfdf5;
      color: #047857;
    }

    .status-pill.disconnected {
      background: #fef2f2;
      color: #b91c1c;
    }

    .status-pill.connecting {
      background: #fefce8;
      color: #92400e;
    }

    .nodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .node-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 18px 18px 14px 18px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      border-left: 6px solid #cbd5e1;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .node-card.state-PRIMARY {
      border-left-color: #10b981;
    }

    .node-card.state-PRIMARY .state-badge {
      background: #ecfdf5;
      color: #047857;
    }

    .node-card.state-STANDBY {
      border-left-color: #3b82f6;
    }

    .node-card.state-STANDBY .state-badge {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .node-card.state-ELECTION {
      border-left-color: #f59e0b;
    }

    .node-card.state-ELECTION .state-badge {
      background: #fffbeb;
      color: #92400e;
    }

    .node-card.state-INACTIVE,
    .node-card.state-FAILED,
    .node-card.state-UNREACHABLE {
      border-left-color: #ef4444;
    }

    .node-card.state-INACTIVE .state-badge,
    .node-card.state-FAILED .state-badge,
    .node-card.state-UNREACHABLE .state-badge {
      background: #fef2f2;
      color: #b91c1c;
    }

    .node-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .node-id {
      font-size: 16px;
      font-weight: 600;
    }

    .state-badge {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: #f3f4f6;
      color: #374151;
    }

    .node-fields {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 4px 12px;
      font-size: 13px;
    }

    .node-fields .key { color: #6b7280; }

    .node-fields .val {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #111827;
      word-break: break-all;
    }

    .actions {
      background: #ffffff;
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button.failover {
      background: #ef4444;
      color: #ffffff;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.failover:hover { background: #dc2626; }
    button.failover:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    #failover-result {
      font-size: 13px;
      color: #4b5563;
    }

    .chart-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .chart-card h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
      color: #4b5563;
    }

    .chart-wrapper {
      position: relative;
      height: 220px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Active-Passive Failover Cluster Dashboard</h1>

    <div class="status-bar">
      <div>
        <span class="label">Status:</span>
        <span id="connection-status" class="status-pill connecting">connecting</span>
      </div>
      <div>
        <span class="label">Last update:</span>
        <span id="last-update" class="value">—</span>
      </div>
      <div>
        <span class="label">Logs/sec:</span>
        <span id="logs-per-sec" class="value">0.00</span>
      </div>
      <div>
        <span class="label">Transport:</span>
        <span id="transport-mode" class="value">—</span>
      </div>
    </div>

    <div id="nodes-grid" class="nodes-grid">
      <!-- node cards injected by app.js -->
    </div>

    <div class="actions">
      <button id="failover-btn" class="failover" type="button">
        Trigger Failover on Current Primary
      </button>
      <span id="failover-result"></span>
    </div>

    <div class="chart-card">
      <h2>Throughput (last 60s, logs/sec)</h2>
      <div class="chart-wrapper">
        <canvas id="throughput-chart"></canvas>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
