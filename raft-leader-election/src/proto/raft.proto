syntax = "proto3";
package raft;

// === Raft consensus service ===
service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc PreVote(RequestVoteRequest) returns (RequestVoteResponse);
}

// === Admin service (for dashboard) ===
service NodeAdminService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc StopNode(StopNodeRequest) returns (StopNodeResponse);
  rpc GetElectionLog(GetElectionLogRequest) returns (GetElectionLogResponse);
  rpc BlockPeer(BlockPeerRequest) returns (BlockPeerResponse);
  rpc UnblockPeer(BlockPeerRequest) returns (BlockPeerResponse);
  rpc GetBlockedPeers(GetBlockedPeersRequest) returns (GetBlockedPeersResponse);
}

// === Raft consensus messages ===
message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
  bool is_pre_vote = 5;
  uint32 priority = 6;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
}

message LogEntry {
  uint64 term = 1;
  bytes data = 2;
}

// === Admin messages ===
message GetStatusRequest {}

message GetStatusResponse {
  string node_id = 1;
  string state = 2;       // "follower", "candidate", "leader"
  uint64 term = 3;
  string voted_for = 4;
  string leader_id = 5;
  bool is_alive = 6;
}

message StopNodeRequest {
  bool graceful = 1;
}

message StopNodeResponse {
  bool success = 1;
  string message = 2;
}

message GetElectionLogRequest {
  uint32 limit = 1;
}

message GetElectionLogResponse {
  repeated ElectionEvent events = 1;
}

message ElectionEvent {
  double timestamp = 1;
  string event_type = 2;   // "election_started", "vote_granted", "became_leader", etc.
  string node_id = 3;
  uint64 term = 4;
  string details = 5;
}

// === Partition simulation messages ===
message BlockPeerRequest {
  string peer_address = 1;
}

message BlockPeerResponse {
  bool success = 1;
  string message = 2;
}

message GetBlockedPeersRequest {}

message GetBlockedPeersResponse {
  repeated string blocked_peers = 1;
}
