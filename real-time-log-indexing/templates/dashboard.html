<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Real-Time Log Indexing</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span id="status-dot" class="status-dot status-degraded" aria-hidden="true"></span>
      <span class="brand-title">Real-Time Log Indexing</span>
      <span class="brand-tag">streaming inverted index &middot; sub-second search</span>
    </div>
    <div class="actions">
      <button id="generate-500" class="btn" type="button">Generate 500</button>
      <button id="generate-5000" class="btn" type="button">Generate 5,000</button>
      <button id="generate-50000" class="btn" type="button">Generate 50,000</button>
    </div>
  </header>

  <section class="stats-grid" aria-label="Live index metrics">
    <div class="stat-card">
      <div class="stat-label">Docs indexed</div>
      <div class="stat-value" id="stats-docs-indexed">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current segment</div>
      <div class="stat-value" id="stats-current-segment-docs">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Flushed in-memory</div>
      <div class="stat-value" id="stats-flushed-memory-segments">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Disk segments</div>
      <div class="stat-value" id="stats-disk-segments">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Memory</div>
      <div class="stat-value" id="stats-memory-bytes">0 B</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Throughput</div>
      <div class="stat-value" id="stats-throughput">0.0 /s</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vocab</div>
      <div class="stat-value" id="stats-vocab-size">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Search p95</div>
      <div class="stat-value" id="stats-query-p95">&mdash;</div>
    </div>
  </section>

  <div class="main-grid">
    <section class="search-panel" aria-label="Search">
      <div class="search-bar">
        <input
          id="search-input"
          type="text"
          placeholder="Search logs &mdash; e.g. error, 192.168.1.1, payment"
          autocomplete="off"
          spellcheck="false">
        <select id="search-service" aria-label="Filter by service">
          <option value="">All services</option>
          {% for svc in services %}<option value="{{ svc }}">{{ svc }}</option>{% endfor %}
        </select>
        <select id="search-level" aria-label="Filter by level">
          <option value="">All levels</option>
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARN">WARN</option>
          <option value="ERROR">ERROR</option>
          <option value="FATAL">FATAL</option>
        </select>
        <input id="search-limit" type="number" min="1" max="500" value="50" aria-label="Result limit">
        <button id="search-button" class="btn btn-primary" type="button">Search</button>
      </div>
      <div id="search-meta" class="search-meta"></div>
      <ul id="search-results" class="results"></ul>
    </section>

    <aside class="live-feed-panel" aria-label="Live feed">
      <div class="live-feed-header">
        <h3 class="live-feed-title">Live feed</h3>
        <span id="live-feed-status" class="live-feed-status" aria-live="polite">disconnected</span>
      </div>
      <ul id="live-feed" class="live-feed"></ul>
    </aside>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
