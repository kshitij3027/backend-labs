version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abpm-app
    ports:
      - "8000:8000"
    env_file: .env.example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - abpm-net

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: abpm-test
    command: pytest -v --tb=short
    profiles: ["test"]
    networks:
      - abpm-net

networks:
  abpm-net:
    driver: bridge
