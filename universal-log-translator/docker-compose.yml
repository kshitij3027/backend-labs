services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./sample_logs:/app/sample_logs:ro

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test

  verify:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["bash", "/app/verify.sh"]
    profiles:
      - verify
