services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - REDIS_HOST=redis

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]
    environment:
      - APP_URL=http://app:8080
      - REDIS_HOST=redis
