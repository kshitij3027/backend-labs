services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    depends_on:
      rabbitmq:
        condition: service_healthy
      app:
        condition: service_started
    command: ["python", "scripts/verify_e2e.py"]
    environment:
      - RABBITMQ_HOST=rabbitmq
