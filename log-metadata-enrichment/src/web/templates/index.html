<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Metadata Enrichment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #ffffff;
            font-size: 1.8rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #b0b0cc;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 0.75rem;
            border: 1px solid #333366;
            border-radius: 6px;
            background-color: #16213e;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            margin-bottom: 1rem;
        }

        textarea:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #4a7dff;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #333366;
            border-radius: 6px;
            background-color: #16213e;
            color: #e0e0e0;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .button-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 6px;
            background-color: #4a7dff;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3a6ae0;
        }

        button:active {
            background-color: #2e59c4;
        }

        button.secondary {
            background-color: #333366;
        }

        button.secondary:hover {
            background-color: #444488;
        }

        h2 {
            margin-bottom: 0.75rem;
            color: #b0b0cc;
            font-size: 1.1rem;
        }

        #result {
            background-color: #0f3460;
            border: 1px solid #333366;
            border-radius: 6px;
            padding: 1rem;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 100px;
            max-height: 500px;
            overflow-y: auto;
            color: #c8d6e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Log Metadata Enrichment</h1>

        <label for="logMessage">Log Message</label>
        <textarea id="logMessage" placeholder="Enter a log message to enrich..."></textarea>

        <label for="source">Source</label>
        <input type="text" id="source" value="web-ui" placeholder="Log source identifier">

        <div class="button-row">
            <button onclick="enrichLog()">Enrich</button>
            <button class="secondary" onclick="loadSamples()">Load Samples</button>
            <button class="secondary" onclick="viewStats()">View Stats</button>
        </div>

        <h2>Result</h2>
        <pre id="result">Results will appear here...</pre>
    </div>

    <script>
        async function enrichLog() {
            const logMessage = document.getElementById("logMessage").value.trim();
            const source = document.getElementById("source").value.trim() || "web-ui";
            const resultEl = document.getElementById("result");

            if (!logMessage) {
                resultEl.textContent = "Error: Please enter a log message.";
                return;
            }

            try {
                const response = await fetch("/api/enrich", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({log_message: logMessage, source: source})
                });
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                resultEl.textContent = "Error: " + err.message;
            }
        }

        async function loadSamples() {
            const resultEl = document.getElementById("result");
            try {
                const response = await fetch("/api/sample-logs");
                const samples = await response.json();
                document.getElementById("logMessage").value = samples[0];
                resultEl.textContent = "Loaded " + samples.length + " samples. First sample placed in textarea.\n\nAll samples:\n" + samples.map(function(s, i) { return (i + 1) + ". " + s; }).join("\n");
            } catch (err) {
                resultEl.textContent = "Error: " + err.message;
            }
        }

        async function viewStats() {
            const resultEl = document.getElementById("result");
            try {
                const response = await fetch("/api/stats");
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                resultEl.textContent = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
