services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=log-enrichment
      - ENVIRONMENT=docker
      - VERSION=1.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test

  verify:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: ["bash", "/app/verify.sh"]
    profiles:
      - verify
