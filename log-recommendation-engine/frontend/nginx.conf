# nginx reverse-proxy + SPA host for the Log Recommendation Engine dashboard.
#
# Inside the docker-compose network the backend is reachable by its service
# name, `api`, on port 8000. The frontend uses RELATIVE URLs (`/api/...`); this
# config rewrites those onto the backend so the browser only ever talks to nginx
# on :80 (no CORS, no hardcoded backend host).
#
# Horizontal scaling (C23): the api service can be scaled to N replicas
# (`docker compose up --scale api=N`). Docker's embedded DNS at 127.0.0.11 then
# resolves `api` to all N replica IPs. To actually load-balance across them, nginx
# must re-resolve the name PER REQUEST rather than caching a single IP at startup —
# which is what a static `upstream { server api; }` block does. We therefore use the
# Docker `resolver` plus a runtime variable in proxy_pass so nginx looks the name up
# (round-robin across replicas) on every request. `valid=10s` bounds DNS caching.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker's embedded DNS — required for per-request re-resolution of `api`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Shared proxy headers so the backend sees the real client + host.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API: putting the target in a variable forces nginx to use the `resolver`
    # at request time (Docker DNS round-robins across scaled `api` replicas) instead
    # of resolving once at startup.
    #
    # IMPORTANT: when proxy_pass uses a VARIABLE, nginx does NOT auto-strip the matched
    # `location /api/` prefix even if a URI/trailing-slash is given — it would forward
    # `/api/health` verbatim (or, with a trailing `/`, just `/`), both → 404 on the API.
    # So we strip the prefix explicitly with `rewrite ... break` and give proxy_pass the
    # bare variable with NO URI part. The rewrite preserves the query string automatically,
    # so `/api/recommend?x=1` -> `http://api:8000/recommend?x=1` and
    # `/api/health` -> `http://api:8000/health`.
    location /api/ {
        set $api_backend "http://api:8000";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_backend;
    }

    # SPA: serve built assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
