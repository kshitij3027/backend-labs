# Compose override for horizontal API scaling (C23).
#
# `docker compose up --scale api=N` cannot start N>1 replicas while the base
# api service publishes a FIXED host port (${API_PORT:-8000}:8000) — every replica
# would try to bind that same host port and collide. This override file removes the
# api's host-port publishing so the service can scale freely; all client traffic is
# instead routed through the dashboard's nginx, which reverse-proxies /api -> api:8000
# by service name and load-balances across the N replicas via Docker's embedded DNS
# (per-request resolution — `resolver 127.0.0.11` + `set $api_backend` +
# `proxy_pass $api_backend`; see frontend/nginx.conf).
#
# Layered on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d \
#       --scale api=3 postgres redis api dashboard
# or simply: `make scale` (optionally `make scale N=5`).
#
# `ports: !reset []` CLEARS the published ports inherited from the base file. A plain
# `ports: []` does NOT override/clear an inherited list on this Compose version — the
# base `${API_PORT:-8000}:8000` would survive the merge and every replica would collide
# on that single host port. The `!reset` YAML tag (Compose's override mechanism, v2.24+)
# forces the merged value to the empty list, so no replica binds a host port and the api
# is reachable only on the internal Docker network — all client traffic reaches the
# scaled replicas through the dashboard's nginx (round-robin via Docker DNS).

services:
  api:
    ports: !reset []
