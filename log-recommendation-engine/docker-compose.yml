# Log Recommendation Engine — service topology (Commit C1).
#
# `api` is the runnable production service: a single uvicorn/FastAPI process on :8000.
# It depends on `postgres` (incident corpus + pgvector embeddings) and `redis`
# (recommendation / embedding cache), both of which expose healthchecks so `api`
# only starts once they are ready.
#
# The profile-gated `test` service runs the pytest suite and never starts on a bare
# `docker compose up`. The dashboard, e2e and loadtest services are added in later
# commits. This project has NO scheduler, so there is no worker/beat/celery service.
# Run via `make up` / `make test`.

services:
  # PostgreSQL with pgvector — durable store for the incident corpus, embeddings
  # (vector(384) column, added in C2), served-recommendation rows, and feedback.
  # The pgvector/pgvector:pg16 image ships the `vector` extension. Internal to the
  # compose network; the host port is commented out to avoid clashing with a
  # host-local Postgres.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: log-recommend-postgres
    environment:
      - POSTGRES_USER=recommend
      - POSTGRES_PASSWORD=recommend
      - POSTGRES_DB=recommend
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommend -d recommend"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — recommendation + embedding cache. Persistence is disabled so it behaves
  # as an ephemeral cache. Internal to the compose network.
  redis:
    image: redis:7-alpine
    container_name: log-recommend-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Live production API — built from the production Dockerfile and exposed on the host.
  # Reaches Postgres/Redis over the compose network by service name (not localhost).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # No container_name: Docker refuses `--scale api=N` (N>1) when a custom
    # container_name is set. Omitting it lets Compose name replicas
    # `<project>-api-1/2/...` so the service scales freely (see C23). Other services
    # keep their fixed names since only `api` needs to scale.
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://recommend:recommend@postgres:5432/recommend
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # /health is dependency-free, so the app is healthy as soon as uvicorn binds;
      # the 60s grace period is a safe margin for image start-up + model load.
      start_period: 60s
    restart: unless-stopped

  # Web dashboard (C15) — a React+Vite SPA built multi-stage and served by nginx,
  # which reverse-proxies `/api/*` to the `api` service (per-request DNS so it
  # round-robins across scaled `api` replicas; see frontend/nginx.conf). Build
  # context is the PROJECT ROOT so the Dockerfile's COPY paths carry the
  # `frontend/` prefix. Lives in the DEFAULT profile (not test/e2e/loadtest), and
  # only starts once `api` is healthy. No container_name so it never clashes.
  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the same
  # code + requirements + baked model as the api, plus the tests) and runs pytest.
  # Profile-gated so it never starts on a bare `docker compose up`. Run via
  # `make test`. Integration tests (added later) reach Postgres/Redis by service name.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    environment:
      - DATABASE_URL=postgresql+psycopg2://recommend:recommend@postgres:5432/recommend
      - REDIS_URL=redis://redis:6379/0
      # Deterministic tests: disable stochastic ε-exploration in the test
      # profile (exploration is unit-tested directly by injecting epsilon/rng).
      - EPSILON_EXPLORE=0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["pytest", "-q"]

  # Black-box end-to-end verifier (C18). Reuses the tester image (Dockerfile.test ships
  # src/ + scripts/ + httpx) and runs scripts/verify_e2e.py against the LIVE api over the
  # compose network — driving the WHOLE loop over HTTP only: seed a controlled corpus ->
  # recommend (ranked, scored, with resolutions) -> feedback -> recommend again -> assert
  # the re-rank shift (an up-voted incident overtakes a down-voted one). It is fully
  # self-seeding, so it needs no `make seed`. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make e2e`.
  #
  # Determinism note: the verifier's FIRST action (after health) is
  # `PUT /config {"epsilon_explore": 0}`, which disables ε-exploration on the *live* api
  # fleet-wide and bumps the config version (clean, un-cached baseline) — so the re-rank
  # ordering assertion is stable WITHOUT any change to the `api` service here. The
  # EPSILON_EXPLORE=0 below only affects this container's own process (it imports nothing
  # that ranks); it is set for parity with the `test` profile and to document intent.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    environment:
      - E2E_BASE_URL=http://api:8000
      - DATABASE_URL=postgresql+psycopg2://recommend:recommend@postgres:5432/recommend
      - REDIS_URL=redis://redis:6379/0
      # Deterministic re-rank is enforced by the verifier (PUT /config epsilon_explore=0
      # against the live api); this env is parity-only and harmless.
      - EPSILON_EXPLORE=0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "scripts.verify_e2e"]

# Named volumes keep the Postgres data + generated datasets across container restarts.
volumes:
  pgdata:
  data:
