# Compose stack for the Intelligent Log Redaction Engine.
#
# C1 ships ONE long-running service (``app``) plus a ``tester`` service
# gated behind the ``test`` profile. Redis is added in C10 — keeping it
# out for now means a fresh clone can ``make build && make test`` without
# pulling a second image.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: log-redaction-engine-app:latest
    container_name: log-redaction-engine-app
    ports:
      - "8000:8000"
    env_file:
      # ``.env`` is generated by the operator from ``.env.example``. Mark
      # optional so ``docker compose config`` works on a fresh clone before
      # env setup.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK; declaring it here as well lets
      # ``depends_on: condition: service_healthy`` work for downstream
      # services we'll add in C10+.
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: log-redaction-engine-tester:latest
    container_name: log-redaction-engine-tester
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      # Bind-mount source + tests so iteration doesn't need a rebuild.
      - .:/app
    working_dir: /app
