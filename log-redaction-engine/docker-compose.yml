# Compose stack for the Intelligent Log Redaction Engine.
#
# C10 adds the `redis` service backing the C10 Backend Protocol; `app`
# and `tester` both wait for redis to report healthy before starting so
# the Redis-backed integration tests and the lifespan's startup ping
# have something to talk to.

services:
  redis:
    # Pinned alpine variant: small image, official Redis 7.x. Pinning the
    # major+minor lets us rebuild reproducibly while still catching
    # patch-level CVE fixes via image pulls.
    image: redis:7-alpine
    container_name: log-redaction-engine-redis
    ports:
      # Exposed locally so an operator can run `redis-cli` from the host
      # to inspect token-mirror keys during demos. Internal traffic from
      # the `app` container goes via the docker-compose network — port
      # mapping is a developer ergonomics affordance, not a production
      # posture.
      - "6379:6379"
    healthcheck:
      # `redis-cli ping` returns `PONG` (exit 0) iff Redis can serve
      # commands. The `app` service's `depends_on: condition: service_healthy`
      # gates startup on this check passing.
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: log-redaction-engine-app:latest
    container_name: log-redaction-engine-app
    ports:
      - "8000:8000"
    depends_on:
      # Wait for Redis to actually be serving commands, not just for the
      # container to start. `service_healthy` blocks until the
      # `redis-cli ping` healthcheck above succeeds — without this gate
      # the app's startup-time Redis ping would race the redis container
      # and we'd flap into the in-memory fallback on every cold boot.
      redis:
        condition: service_healthy
    env_file:
      # ``.env`` is generated by the operator from ``.env.example``. Mark
      # optional so ``docker compose config`` works on a fresh clone before
      # env setup.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK; declaring it here as well lets
      # ``depends_on: condition: service_healthy`` work for downstream
      # services we'll add in C10+.
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: log-redaction-engine-tester:latest
    container_name: log-redaction-engine-tester
    profiles:
      - test
    depends_on:
      # Same gate as the `app` service so the Redis integration tests
      # (`tests/integration/test_redis_backend.py`) reliably find a live
      # Redis to talk to. The unit tests don't need Redis but waiting a
      # few extra seconds at test startup is harmless.
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      # Bind-mount source + tests so iteration doesn't need a rebuild.
      - .:/app
    working_dir: /app
