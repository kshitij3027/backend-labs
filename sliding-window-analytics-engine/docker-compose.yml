services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
      - DISABLE_GENERATOR=1
    depends_on:
      redis:
        condition: service_healthy
    command: ["pytest", "-v"]

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    environment:
      - APP_URL=http://app:8000
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]
