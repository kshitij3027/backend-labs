services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: streams-dashboard-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kafka-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streams-dashboard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - kafka-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streams-dashboard-kafka-init
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    networks:
      - kafka-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streams-dashboard-app
    ports:
      - "5050:5000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - kafka-net

  data-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streams-dashboard-generator
    command: ["python", "scripts/generate_data.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EVENTS_PER_SECOND=100
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - kafka-net

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: streams-dashboard-test
    profiles:
      - test
    networks:
      - kafka-net

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: streams-dashboard-e2e
    command: ["python", "scripts/verify_e2e.py"]
    environment:
      - APP_URL=http://app:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - e2e
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
