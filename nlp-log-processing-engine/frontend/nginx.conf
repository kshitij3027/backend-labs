# nginx reverse-proxy + SPA host for the NLP Log Processing Engine dashboard.
#
# Inside the docker-compose network the backend is reachable by its service name,
# `backend`, on port 8000. The frontend uses RELATIVE URLs (`/api/...`, `/ws`); this
# config forwards those to the backend so the browser only ever talks to nginx on :80
# (no CORS, no hardcoded backend host).
#
# Per-request DNS re-resolution: rather than a static `upstream { server backend; }`
# block (which resolves the name ONCE at startup and caches a single IP), we use the
# Docker `resolver` plus a runtime `$backend` variable in proxy_pass so nginx looks the
# name up on every request. `valid=10s` bounds DNS caching. This keeps the proxy correct
# if the backend container is recreated (new IP) or ever scaled.
#
# No prefix strip: our backend already namespaces every REST route under `/api/*`, so we
# forward the path VERBATIM. When proxy_pass uses a VARIABLE it does NOT auto-append the
# location-matched URI, so we pass `$request_uri` explicitly (it carries the full original
# path + query string): `/api/analyze` -> `http://backend:8000/api/analyze`.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker's embedded DNS — required for per-request re-resolution of `backend`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend service target (host:port); the scheme is added at each proxy_pass so the
    # variable form triggers nginx's runtime resolver.
    set $backend "backend:8000";

    # Shared proxy headers so the backend sees the real client + host.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API: the target lives in a variable so nginx uses the `resolver` at request
    # time. `$request_uri` forwards the path UNCHANGED (no `/api` strip), because our
    # endpoints already live under `/api`.
    location /api/ {
        proxy_pass http://$backend$request_uri;
    }

    # WebSocket: the live analysis + stats feed. HTTP/1.1 + the Upgrade/Connection headers
    # are REQUIRED for nginx to switch the connection to the WebSocket protocol and stream
    # the `{"type":"analysis",...}` / `{"type":"stats",...}` frames straight through to
    # `backend:8000/ws`. The long read/send timeouts keep an idle-but-open socket alive
    # between pushes (the client also sends a periodic "ping" keepalive).
    location /ws {
        proxy_pass http://$backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: serve built assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Cheap gzip for the JS/CSS bundle and JSON proxy responses.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
