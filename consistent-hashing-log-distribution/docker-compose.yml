services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-8080}:5000"
    environment:
      - CLUSTER_NAME=log-distribution-cluster
      - CLUSTER_NODES=node1,node2,node3
      - CLUSTER_VIRTUAL_NODES=150
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
