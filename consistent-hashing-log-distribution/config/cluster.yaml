      host: localhost
      port: 5001
      data_dir: data/node1
    - id: node2
      host: localhost
      port: 5002
      data_dir: data/node2
    - id: node3
      host: localhost
      port: 5003
      data_dir: data/node3

  dashboard:
    host: "0.0.0.0"
    port: 5000
