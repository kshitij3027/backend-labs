services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alertuser
      POSTGRES_PASSWORD: alertpass
      POSTGRES_DB: alertdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alertuser -d alertdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build: .
    command: python scripts/init_db.py
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    restart: "no"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env.example
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.example
    command: ["pytest", "-v"]

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: http://app:8000
    env_file: .env.example
    command: ["python", "scripts/verify_e2e.py"]

  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - loadtest
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_URL: http://app:8000
    env_file: .env.example
    command: ["python", "scripts/load_test.py"]
