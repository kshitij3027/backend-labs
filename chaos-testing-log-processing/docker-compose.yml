# Chaos framework only in C1; target stack (redis + producer + consumer)
# lands in C4. The `chaos-net` network is declared here so later commits
# can attach target containers to it without churning this scaffold.

services:
  chaos-framework:
    build: .
    image: chaos-framework:dev
    container_name: chaos-framework
    ports:
      - "8000:8000"
    volumes:
      # Read-write socket so the framework can exec/pause/kill/disconnect
      # target containers via the Docker SDK (gated by the allowlist in C3).
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistence for SQLite + experiment artifacts (lands in C12).
      - ./data:/app/data
    environment:
      LOG_LEVEL: INFO
      CHAOS_API_PORT: 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - chaos-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - chaos-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 2s

  log-producer:
    build:
      context: ./targets/producer
    image: log-producer:dev
    container_name: log-producer
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    labels:
      chaos.target: "true"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOGS_KEY: logs
      PRODUCE_HZ: 10
    ports:
      - "9001:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chaos-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  log-consumer:
    build:
      context: ./targets/consumer
    image: log-consumer:dev
    container_name: log-consumer
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    labels:
      chaos.target: "true"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOGS_KEY: logs
      BLPOP_TIMEOUT_S: 1
    ports:
      - "9002:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chaos-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  test:
    build:
      context: .
    image: chaos-framework:dev
    container_name: chaos-framework-test
    profiles: ["test"]
    user: "root"
    working_dir: /app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./config:/app/config
      - ./pytest.ini:/app/pytest.ini:ro
    command: ["pytest", "tests/", "-v"]

networks:
  chaos-net:
    driver: bridge
