# Delta Encoding Log Engine — service topology.
#
# C9 defines the runnable `app`: a single FastAPI process on :8080 holding the
# segment store + metrics in memory (no volume, no database). Later commits add
# the `test` / `e2e` / `loadtest` profile services that drive the live stack by
# service name (`make test` / `make e2e` / `make load`).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta-encoding-app
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KEYFRAME_INTERVAL=${KEYFRAME_INTERVAL:-100}
      - DELTA_BASELINE=${DELTA_BASELINE:-previous}
      - GZIP_DELTAS=${GZIP_DELTAS:-false}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    # In-memory state on a single uvicorn worker — 512m is ample headroom for
    # uvicorn plus one batch + its delta encoding.
    mem_limit: 512m
    restart: unless-stopped

  # Unit + integration suite (C13). Builds the tester image (Dockerfile.test ships
  # the same code + requirements as the app) and runs pytest. No running service is
  # needed — these are in-process tests — so there is no app dependency. Run via
  # `make test`. Profile-gated, so it never starts on a bare `docker compose up`.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    command: ["pytest", "-q"]

  # Cross-container E2E verifier (C13). Waits for `app` to be healthy, then drives the
  # live server over HTTP + WebSocket by service name and walks the full generate →
  # compress → reconstruct → stats flow, asserting fidelity + the reduction/latency/
  # error gates. Run via `make e2e`; its exit code is the suite's pass/fail.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    environment:
      - APP_URL=http://app:8080
    depends_on:
      app:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]

  # Containerized load test (C13). Waits for `app` to be healthy, then drives a
  # compression-throughput + concurrent-HTTP + processing-throughput workload by service
  # name and asserts compress >=1000 eps, processing >=100 eps, error rate <=1%, and
  # reconstruct p99 <100ms. Run via `make load`.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [loadtest]
    environment:
      - APP_URL=http://app:8080
      - LOAD_DURATION=8
      - LOAD_CONCURRENCY=16
      - LOAD_BATCH=10000
    depends_on:
      app:
        condition: service_healthy
    command: ["python", "scripts/load_test.py"]
