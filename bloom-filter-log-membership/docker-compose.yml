# Bloom Filter Log Membership — service topology.
#
# C2 defines the runnable `app` (no external deps for /health) and the
# profile-gated `test` service. C12 adds the `dashboard` service on port
# 8002; C13 adds the cross-container `e2e` / `loadtest` profile services
# that drive the live stack by service name (`make e2e` / `make load`).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloom-filter-app
    ports:
      - "${API_PORT:-8001}:8001"
    environment:
      - DATA_DIR=/app/data
      - SQLITE_PATH=/app/data/logs.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    # In-process filter state on a single uvicorn worker — 512m is plenty
    # (the three spec filters total ~5 MB of bit arrays).
    mem_limit: 512m
    restart: unless-stopped

  # C12: the real-time dashboard — the SAME image as `app` (compose builds it
  # once and reuses it), just a different command, so dashboard page loads and
  # WebSocket fan-out run in their own process and never compete with the hot
  # /logs add/query path. It reaches the API over HTTP by service name.
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloom-filter-dashboard
    command: ["uvicorn", "src.dashboard:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "${DASHBOARD_PORT:-8002}:8002"
    environment:
      - API_BASE_URL=http://app:8001
      - DASHBOARD_REFRESH_MS=${DASHBOARD_REFRESH_MS:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      app:
        condition: service_healthy
    # Stateless process: settings + one poll task + connection set. 256m is
    # generous headroom for uvicorn + httpx.
    mem_limit: 256m
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    environment:
      - PYTHONPATH=/app
    command: ["pytest", "-v"]

  # C13: cross-container E2E verifier. Waits for BOTH services to be healthy,
  # then drives them over HTTP + WebSocket by service name: add/query/populate
  # round trips, the demo + sessions performance gates, the two-tier pipeline
  # skip/false-positive proofs, and the dashboard page/static/WS-tick/proxy
  # contract. Run via `make e2e`; its exit code is the suite's pass/fail.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    environment:
      - APP_URL=http://app:8001
      - DASHBOARD_URL=http://dashboard:8002
      - PYTHONPATH=/app
    depends_on:
      app:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]

  # C13: containerized load test. Phase 1 gates the in-process engine
  # (>=10k ops/sec managed, <1ms avg query), phase 2 the live HTTP path by
  # service name (>=1k qps, <=1% errors), phase 3 the memory-vs-full-keys
  # ratio from /stats (<5% for the p=0.01 filters). Run via `make load`.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [loadtest]
    environment:
      - APP_URL=http://app:8001
      - LOAD_DURATION_SECONDS=${LOAD_DURATION_SECONDS:-8}
      - LOAD_CONCURRENCY=${LOAD_CONCURRENCY:-16}
      - PYTHONPATH=/app
    depends_on:
      app:
        condition: service_healthy
    command: ["python", "scripts/load_test.py"]
