services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - kafka-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    networks:
      - kafka-net

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
    networks:
      - kafka-net

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    entrypoint: ["python", "-m", "src.producer", "--count", "500", "--rate", "50"]
    profiles:
      - producer
    networks:
      - kafka-net

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    networks:
      - kafka-net

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      consumer:
        condition: service_healthy
    environment:
      APP_URL: http://consumer:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    entrypoint: ["python", "scripts/verify_e2e.py"]
    profiles:
      - e2e
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
