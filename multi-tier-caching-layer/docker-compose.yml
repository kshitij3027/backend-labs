# Multi-Tier Caching Layer — service topology.
#
# C2 defines only the runnable `app` (no external deps for /health) and the
# profile-gated `test` service. Later commits append, in this order:
#   * redis     (redis:7-alpine, redis-cli ping healthcheck)         — C8
#   * postgres  (postgres:16-alpine, pg_isready healthcheck, volume) — C9
#   * db-init   (one-shot `python scripts/init_db.py`)               — C9
# and wire `app`/`test`/`e2e` depends_on for them, plus REDIS_URL / DATABASE_URL
# into the relevant `environment:` blocks. The `e2e` and `loadtest` profile
# services are added by C19 / C20.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cache
      POSTGRES_PASSWORD: cache
      POSTGRES_DB: cache
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cache -d cache"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/init_db.py"]
    environment:
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
    # Tests manage their own schema/data via the pg_pool fixture; they depend
    # only on the running services, NOT on the heavy db-init seed.
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["pytest", "-v"]

  # --- appended by later commits ---------------------------------------------
  # e2e:      profile ["e2e"], `python scripts/verify_e2e.py`              (C19)
  # loadtest: profile ["loadtest"], `python scripts/load_test.py`         (C20)

volumes:
  pgdata: {}
