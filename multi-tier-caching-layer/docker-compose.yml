# Multi-Tier Caching Layer — service topology.
#
# C2 defines only the runnable `app` (no external deps for /health) and the
# profile-gated `test` service. Later commits append, in this order:
#   * redis     (redis:7-alpine, redis-cli ping healthcheck)         — C8
#   * postgres  (postgres:16-alpine, pg_isready healthcheck, volume) — C9
#   * db-init   (one-shot `python scripts/init_db.py`)               — C9
# and wire `app`/`test`/`e2e` depends_on for them, plus REDIS_URL / DATABASE_URL
# into the relevant `environment:` blocks. The `e2e` and `loadtest` profile
# services are added by C19 / C20.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cache
      POSTGRES_PASSWORD: cache
      POSTGRES_DB: cache
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cache -d cache"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/init_db.py"]
    environment:
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://cache:cache@postgres:5432/cache
    # Tests manage their own schema/data via the pg_pool fixture; they depend
    # only on the running services, NOT on the heavy db-init seed.
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["pytest", "-v"]

  # Cross-container E2E verifier (C19). Waits for the full stack to be healthy,
  # then drives the live `app` over HTTP + WebSocket by service name. Run via
  # `make e2e` (`--profile e2e up --build --abort-on-container-exit`); its exit
  # code is the suite's pass/fail. It does NOT stop redis — the stop-Redis
  # fallback choreography is host/main-thread driven (see plan.md).
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    environment:
      - APP_URL=http://app:8000
      - PYTHONPATH=/app
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]

  # Containerized load test (C20). Waits for `app` to be healthy, then drives a
  # Zipfian query mix over HTTP by service name and asserts throughput > 100
  # req/s, cached p90 < 100ms, and error rate <= 1%. Run via `make load`
  # (`--profile loadtest run --build --rm loadtest`); its exit code is the gate
  # pass/fail. The seed (db-init) pre-loads ~200k rows so the uncached path runs
  # a real GROUP BY scan, making the cache speedup genuine.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - loadtest
    environment:
      - APP_URL=http://app:8000
      - PYTHONPATH=/app
    depends_on:
      app:
        condition: service_healthy
    command: ["python", "scripts/load_test.py"]

volumes:
  pgdata: {}
