version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cb-engine-app
    ports:
      - "8000:8000"
    env_file: .env.example
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - cb-net

  redis:
    image: redis:7-alpine
    container_name: cb-engine-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cb-net

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: cb-engine-test
    command: pytest -v --tb=short
    profiles: ["test"]
    networks:
      - cb-net

networks:
  cb-net:
    driver: bridge
