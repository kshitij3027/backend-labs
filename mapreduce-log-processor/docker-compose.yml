services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mapreduce
      POSTGRES_PASSWORD: mapreduce
      POSTGRES_DB: mapreduce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapreduce -d mapreduce"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build: .
    command: python scripts/init_db.py
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    restart: "no"

  generate-logs:
    build: .
    command: python scripts/generate_logs.py
    volumes:
      - log-data:/data
    restart: "no"

  coordinator:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      generate-logs:
        condition: service_completed_successfully
    env_file: .env.example
    volumes:
      - log-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build: .
    command: python -m src.worker.main
    depends_on:
      coordinator:
        condition: service_healthy
      generate-logs:
        condition: service_completed_successfully
    env_file: .env.example
    volumes:
      - log-data:/data
    deploy:
      replicas: 2

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    profiles:
      - test
    env_file: .env.example

volumes:
  log-data:
