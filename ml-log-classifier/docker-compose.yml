# ML Log Classifier — service topology.
#
# `app` is the runnable production service: a single uvicorn/FastAPI process on
# :8000 serving the classification API and the live-metrics WebSocket. Trained
# models and generated data persist on named volumes so they survive restarts.
#
# The profile-gated `test` service runs the pytest suite and never starts on a bare
# `docker compose up`. Additional services (`dashboard`, `e2e`, `load`) slot in here
# in later commits following the same profile pattern. Run via `make up` /
# `make test`.

services:
  # Live production service — built from the production Dockerfile and exposed on
  # the host. Tunable knobs (log level, config path, retrain threshold, ...) are
  # overridable from the environment.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-log-classifier-app
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CONFIG_PATH=/app/config/config.yaml
    volumes:
      - models:/app/models
      - data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First boot trains a model during startup (~10-15s) before serving, so a
      # 60s grace period prevents a spurious "unhealthy" during first-boot training.
      start_period: 60s
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the
  # same code + requirements as the app) and runs pytest in-process — no running
  # service required. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make test`.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    command: ["pytest", "-q"]

# Named volumes keep trained models + generated datasets across container restarts.
volumes:
  models:
  data:
