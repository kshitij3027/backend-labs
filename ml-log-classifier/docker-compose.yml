# ML Log Classifier — service topology.
#
# `app` is the runnable production service: a single uvicorn/FastAPI process on
# :8000 serving the classification API and the live-metrics WebSocket. Trained
# models and generated data persist on named volumes so they survive restarts.
#
# The profile-gated `test`, `loadtest`, and `e2e` services run the pytest suite, the
# perf/load probes, and the full black-box verifier respectively; none start on a bare
# `docker compose up`. The `dashboard` service serves the React SPA. Run via `make up`
# / `make test` / `make load` / `make e2e` / `make ui`.

services:
  # Live production service — built from the production Dockerfile and exposed on
  # the host. Tunable knobs (log level, config path, retrain threshold, ...) are
  # overridable from the environment.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-log-classifier-app
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CONFIG_PATH=/app/config/config.yaml
    volumes:
      - models:/app/models
      - data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First boot trains a model during startup (~10-15s) before serving, so a
      # 60s grace period prevents a spurious "unhealthy" during first-boot training.
      start_period: 60s
    restart: unless-stopped

  # React + WebSocket dashboard (Commit 14). A multi-stage image builds the Vite
  # SPA and serves it from nginx, which reverse-proxies `/api` and `/ws` to the
  # `app` service over the compose network (so the browser only talks to nginx).
  # Waits for `app` to be healthy before starting. Brought up via `make ui`.
  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ml-log-classifier-dashboard
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # Unit + integration suite. Builds the tester image (Dockerfile.test ships the
  # same code + requirements as the app) and runs pytest in-process — no running
  # service required. Profile-gated so it never starts on a bare
  # `docker compose up`. Run via `make test`.
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [test]
    command: ["pytest", "-q"]

  # Performance + load suite (Commit 16). Reuses the tester image (it ships
  # `requests` and the whole project, so `scripts/` are present) but, unlike `test`,
  # runs BLACK-BOX against the live `app` over the compose network — it waits for the
  # app healthcheck, then runs the latency probe and the throughput probe back to
  # back. Profile-gated so it never starts on a bare `docker compose up`. Run via
  # `make load`.
  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [load]
    depends_on:
      app:
        condition: service_healthy
    environment:
      - APP_URL=http://app:8000
    command: ["sh", "-c", "python scripts/perf_test.py && python scripts/load_test.py"]

  # Full black-box end-to-end verifier (Commit 17). Reuses the tester image (it ships
  # `requests` + `websocket-client` and the whole project, so `scripts/` are present)
  # and runs `scripts/verify_e2e.py` against the live `app` over the compose network —
  # exercising the entire flow (health -> classify -> stream -> WebSocket -> train ->
  # models/feature-importance/adaptive/services/cache -> stats). Waits for the app
  # healthcheck first. Profile-gated so it never starts on a bare `docker compose up`.
  # Run via `make e2e`.
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: [e2e]
    depends_on:
      app:
        condition: service_healthy
    environment:
      - APP_URL=http://app:8000
    command: ["python", "scripts/verify_e2e.py"]

# Named volumes keep trained models + generated datasets across container restarts.
volumes:
  models:
  data:
