services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python scripts/wait_for_rabbitmq.py

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    network_mode: "service:rabbitmq"
    command: python -m pytest -v

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      DASHBOARD_PORT: "5555"
    ports:
      - "5555:5555"
    command: python -m src.dashboard.app

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python -c "from src.setup import RabbitMQSetup; RabbitMQSetup().setup_all(); from src.producer import LogProducer; p = LogProducer(); p.connect(); p.run_continuous(rate=10)"

  error-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python -c "from src.consumers.error_consumer import ErrorConsumer; c = ErrorConsumer(); c.connect(); c.start_consuming()"

  security-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python -c "from src.consumers.security_consumer import SecurityConsumer; c = SecurityConsumer(); c.connect(); c.start_consuming()"

  database-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python -c "from src.consumers.database_consumer import DatabaseConsumer; c = DatabaseConsumer(); c.connect(); c.start_consuming()"

  audit-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    command: python -c "from src.consumers.audit_consumer import AuditConsumer; c = AuditConsumer(); c.connect(); c.start_consuming()"

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
    network_mode: "service:rabbitmq"
    command: python scripts/verify_e2e.py
    profiles:
      - e2e

volumes:
  rabbitmq_data:
