services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-5050}:5000"
    environment:
      - PARTITION_STRATEGY=source
      - PARTITION_NUM_NODES=3
      - PARTITION_DATA_DIR=/app/data
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test

volumes:
  app-data:
