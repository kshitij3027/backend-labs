# Compose stack for the Automated Log Retention engine.
#
# Two services:
#   - app    : the FastAPI service (the actual application). Runs a single
#              uvicorn worker because APScheduler runs in-process and is
#              only safe under one worker (multi-worker would race on the
#              shared SQLAlchemyJobStore).
#   - tester : ephemeral pytest container, guarded by the ``test`` profile
#              so ``docker compose up`` does NOT start it. Bring it up
#              explicitly via ``docker compose --profile test run --rm
#              tester …`` (the Makefile targets do this).
#
# The tester service ``depends_on: app`` only for E2E flows that hit the
# live HTTP surface; unit tests don't need the app and complete without
# touching it (depends_on is harmless because the tester is invoked via
# ``run --rm``, which starts dependencies just-in-time per invocation).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alr-app:latest
    container_name: alr-app
    ports:
      - "8000:8000"
    env_file:
      # ``.env`` is generated by the operator from ``.env.example``. Mark
      # optional so ``docker compose config`` works on a fresh clone
      # before env setup.
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      # SQLite database file and tiered storage live on a host bind-mount
      # so retention state survives ``docker compose down`` and an
      # operator can inspect tier contents from the host.
      - ./data:/app/data
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK; declaring it here as well
      # lets ``depends_on: condition: service_healthy`` work for the
      # tester service below.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  tester:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: alr-tester:latest
    container_name: alr-tester
    profiles:
      # Guarded by the ``test`` profile so ``docker compose up`` does
      # NOT start the tester. Invoke it via
      # ``docker compose --profile test run --rm tester …``.
      - test
    depends_on:
      # Only relevant for E2E targets that hit ``http://app:8000`` over
      # the compose network. Unit tests don't need the app, but waiting
      # the extra few seconds for the healthcheck is harmless.
      app:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      BASE_URL: http://app:8000
    volumes:
      # Bind-mount the whole project so edits to src/ or tests/ are
      # picked up without rebuilding the tester image.
      - .:/app
    working_dir: /app
