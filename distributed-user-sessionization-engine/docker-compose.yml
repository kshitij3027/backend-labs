services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DISABLE_SIMULATOR=${DISABLE_SIMULATOR:-0}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - DISABLE_SIMULATOR=1
    depends_on:
      redis:
        condition: service_healthy
    command: ["pytest", "-v"]

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - e2e
    environment:
      - APP_URL=http://engine:8000
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "scripts/verify_e2e.py"]

  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - loadtest
    environment:
      - APP_URL=http://engine:8000
      - PYTHONPATH=/app
    depends_on:
      engine:
        condition: service_healthy
    command: ["python", "scripts/load_test.py", "--url", "http://engine:8000", "--rate", "100", "--duration", "10"]
